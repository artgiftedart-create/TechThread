<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechThread Pro | Growth Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>

    <style>
        :root {
            --bg: #e0e5ec;
            --text: #4a5568;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent: #6d5dfc;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            padding: 50px;
            border-radius: 50px;
            background: var(--bg);
            box-shadow: 20px 20px 60px var(--shadow-dark),
                       -20px -20px 60px var(--shadow-light);
            position: relative;
        }

        /* Neumorphic Input Fields */
        .neu-inset {
            background: var(--bg);
            border-radius: 20px;
            box-shadow: inset 8px 8px 16px var(--shadow-dark),
                        inset -8px -8px 16px var(--shadow-light);
            border: none;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        /* Neumorphic Buttons */
        .neu-button {
            margin-top: 25px;
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            background: var(--bg);
            box-shadow: 8px 8px 16px var(--shadow-dark),
                        -8px -8px 16px var(--shadow-light);
            border: none;
            color: var(--accent);
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .neu-button:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                        inset -5px -5px 10px var(--shadow-light);
            transform: scale(0.98);
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 45px;
            font-weight: 600;
        }

        /* X Floating Button */
        .x-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: var(--bg);
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                        -8px -8px 16px var(--shadow-light);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s ease;
            z-index: 1000;
        }

        .x-link:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
            transform: scale(0.92);
        }

        .x-link svg { width: 28px; height: 28px; fill: #000; }

        #output {
            margin-top: 30px;
            display: none;
            line-height: 1.8;
            font-size: 1rem;
        }

        .hidden { display: none; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logout-btn {
            padding: 12px 25px;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #e53e3e;
            width: auto;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-section">
            <h1>TechThread Pro</h1>
            <p class="subtitle">Next-Gen Content Strategy Engine</p>
            <input type="email" id="email" class="neu-inset" placeholder="your@email.com">
            <button class="neu-button" onclick="signIn()">Proceed</button>
            <p id="auth-status" style="text-align: center; font-size: 0.9rem; margin-top: 25px; font-weight: 600; color: var(--accent);"></p>
        </div>

        <div id="dashboard" class="hidden">
            <div class="header-row">
                <h1 style="font-size: 1.8rem; margin: 0;">Command Center</h1>
                <button class="neu-button logout-btn" onclick="signOut()">Logout</button>
            </div>

            <textarea id="sourceText" class="neu-inset" style="height: 200px; resize: none;" placeholder="Paste raw technical data, blockchain news, or insights..."></textarea>
            
            <button id="generateBtn" class="neu-button" onclick="generateThread()">Generate viral thread</button>
            
            <div id="loading" class="subtitle hidden" style="margin-top: 25px;">AI is sculpting your strategy...</div>
            <div id="output" class="neu-inset"></div>
        </div>
    </div>

    <a href="https://x.com/Joe_Wills1" target="_blank" class="x-link" title="Visit Joe Wills on X">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
    </a>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // --- PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = 'https://jlcotzxaqmafljaezses.supabase.co';
        const SUPABASE_KEY = 'sb_secret_ZgNFBTfsaI_8EnzZHEA1_g_LTrL1GxC';
        const GEMINI_KEY = 'AIzaSyAEuGMSwS96eM_pyl9qrKh3BgmHcSITX-o';

        const supabase = bootstrapSupabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const genAI = new GoogleGenerativeAI(GEMINI_KEY);

        window.signIn = async () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("Email required");
            
            const { error } = await supabase.auth.signInWithOtp({ 
                email,
                options: { emailRedirectTo: window.location.origin + window.location.pathname }
            });
            // Changed message as requested
            document.getElementById('auth-status').innerText = error ? error.message : "Sent an email. Check your inbox!";
        }

        window.signOut = async () => {
            await supabase.auth.signOut();
            location.reload();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }
        });

        window.generateThread = async () => {
            const input = document.getElementById('sourceText').value;
            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');

            if (!input) return alert("Input data is empty.");

            try {
                btn.style.boxShadow = "inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light)";
                loading.classList.remove('hidden');
                output.style.display = 'none';

                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = `You are a high-level social media growth strategist. Convert the following technical data into a viral 4-tweet thread. Use a strong hook, emojis, and professional formatting: ${input}`;
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                
                output.innerText = response.text();
                output.style.display = 'block';
            } catch (err) {
                alert("Engine Error: " + err.message);
            } finally {
                btn.style.boxShadow = "8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light)";
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
