<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechThread Pro</title>
    <link rel="icon" href="https://img.icons8.com/fluency/48/t.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>

    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #8b5cf6; /* Futuristic Purple */
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            font-size: 2rem;
        }

        .input-group {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-family: inherit;
            resize: none;
            transition: border 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #7c3aed;
        }

        #output {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
            border-left: 4px solid var(--accent);
            display: none;
        }

        .auth-view { text-align: center; }
        .hidden { display: none; }
        .status { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <div id="auth-section" class="auth-view">
            <h1>TechThread Pro</h1>
            <p style="color: #94a3b8;">Futuristic Content Engine</p>
            <input type="email" id="email" placeholder="Enter your email" style="width: 80%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #000; color: #fff; margin-bottom: 15px;">
            <button onclick="signIn()">Enter System</button>
            <div id="auth-status" class="status"></div>
        </div>

        <div id="dashboard" class="hidden">
            <div class="header">
                <h1>TechThread Pro</h1>
                <button onclick="signOut()" style="width: auto; padding: 8px 15px; font-size: 0.8rem; background: transparent; border: 1px solid var(--border);">Log Out</button>
            </div>

            <div class="input-group">
                <textarea id="sourceText" placeholder="Paste technical data or insights here..."></textarea>
            </div>
            
            <button id="generateBtn" onclick="generateThread()">GENERATE VIRAL THREAD</button>
            <div id="loading" class="status hidden">INITIALIZING AI ENGINE...</div>
            
            <div id="output"></div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // CONFIGURATION - UPDATE THESE!
        const SUPABASE_URL = 'https://jlcotzxaqmafljaezses.supabase.co';
        const SUPABASE_KEY = 'sb_secret_ZgNFBTfsaI_8EnzZHEA1_g_LTrL1GxC';
        const GEMINI_KEY = 'AIzaSyAEuGMSwS96eM_pyl9qrKh3BgmHcSITX-o';

        const supabase = bootstrapSupabase.createClient(https://jlcotzxaqmafljaezses.supabase.co, sb_secret_ZgNFBTfsaI_8EnzZHEA1_g_LTrL1GxC);
        const genAI = new GoogleGenerativeAI(AIzaSyAEuGMSwS96eM_pyl9qrKh3BgmHcSITX-o);

        // --- AUTH LOGIC ---
        window.signIn = async () => {
            const email = document.getElementById('email').value;
            const { error } = await supabase.auth.signInWithOtp({ 
                email,
                options: { emailRedirectTo: window.location.href }
            });
            document.getElementById('auth-status').innerText = error ? error.message : "Magic Link sent! Check your email.";
        }

        window.signOut = async () => {
            await supabase.auth.signOut();
            location.reload();
        }

        // Check user session on load
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }
        });

        // --- AI LOGIC ---
        window.generateThread = async () => {
            const input = document.getElementById('sourceText').value;
            const btn = document.getElementById('generateBtn');
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');

            if (!input) return alert("Please provide data first.");

            try {
                btn.disabled = true;
                loading.classList.remove('hidden');
                output.style.display = 'none';

                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = `You are an expert Social Media Growth Strategist. Convert this text into a 3-5 tweet high-engagement X thread with emojis and hooks: ${input}`;
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                
                output.innerText = response.text();
                output.style.display = 'block';
            } catch (err) {
                alert("AI Engine Error: " + err.message);
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
